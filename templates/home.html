
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="login">

    <div class="header">
        <h1><i class="fa-solid fa-graduation-cap"></i> Student Exam Performance Indicator</h1>
        <p>Predict your Mathematics Score using Machine Learning</p>
    </div>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <legend>Student Details</legend>

        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-user"></i> Gender</label>
            <select class="form-control" name="gender" required>
                <option selected disabled value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-users"></i> Race / Ethnicity</label>
            <select class="form-control" name="ethnicity" required>
                <option selected disabled value="">Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-school"></i> Parent Education</label>
            <select class="form-control" name="parental_level_of_education" required>
                <option selected disabled value="">Select Education</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master's Degree</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-utensils"></i> Lunch Type</label>
            <select class="form-control" name="lunch" required>
                <option selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">Free / Reduced</option>
                <option value="standard">Standard</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-book-open"></i> Test Preparation Course</label>
            <select class="form-control" name="test_preparation_course" required>
                <option selected disabled value="">Select Course</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-pen"></i> Writing Score</label>
            <input class="form-control"
                   type="number"
                   name="writing_score"
                   placeholder="Enter Writing Score"
                   min="0"
                   max="100"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="fa-solid fa-book"></i> Reading Score</label>
            <input class="form-control"
                   type="number"
                   name="reading_score"
                   placeholder="Enter Reading Score"
                   min="0"
                   max="100"
                   required>
        </div>

        <div class="mb-3">
            <input class="btn" type="submit" value="Predict Maths Score">
        </div>

    </form>

    {% if results %}
    <div class="result-card">
        <h2><i class="fa-solid fa-chart-line"></i> Predicted Maths Score</h2>
        <h1>{{ results }}</h1>
    </div>
    {% endif %}

</div>

</body>
</html>
